[General]
network = WirelessNetwork
sim-time-limit = 600s
record-eventlog = false
**.vector-recording = true
**.scalar-recording = true

# Réseau WiFi Configuration
*.accessPoint.wlan[*].bitrate = 54Mbps
*.host[*].wlan[*].bitrate = 54Mbps

# Couche physique
*.accessPoint.wlan[*].radio.transmitter.power = 20mW
*.host[*].wlan[*].radio.transmitter.power = 20mW

# Paramètres UDP
*.host[*].numApps = 1
*.host[*].app[0].typename = "UdpBasicApp"
*.host[*].app[0].destAddresses = "accessPoint"
*.host[*].app[0].destPort = 5000
*.host[*].app[0].messageLength = 512B
*.host[*].app[0].sendInterval = 1s

*.accessPoint.numApps = 1
*.accessPoint.app[0].typename = "UdpSink"
*.accessPoint.app[0].localPort = 5000

# Configuration réseau
*.accessPoint.networkLayer.configurator.networkConfiguratorModule = ""
*.host[*].networkLayer.configurator.networkConfiguratorModule = ""

# Couche MAC
*.*.wlan[*].mac.basicBitrate = 6Mbps
*.*.wlan[*].mac.controlBitrate = 6Mbps

# --- SCÉNARIO 1 : STATIQUE (Static) ---
[Config Static]
description = "All nodes are stationary"

*.host[*].mobilityType = "StationaryMobility"
*.accessPoint.mobilityType = "StationaryMobility"

*.host[*].mobility.initialX = uniform(50m, 350m)
*.host[*].mobility.initialY = uniform(50m, 350m)
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

# --- SCÉNARIO 2 : MOBILITÉ TOTALE (Full Mobility) ---
[Config FullMobility]
description = "All nodes move randomly"

*.host[*].mobilityType = "RandomWaypointMobility"
*.accessPoint.mobilityType = "StationaryMobility"

*.host[*].mobility.speed = uniform(2mps, 5mps)
*.host[*].mobility.waitTime = uniform(0s, 5s)
*.host[*].mobility.initialX = uniform(50m, 350m)
*.host[*].mobility.initialY = uniform(50m, 350m)
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

# --- SCÉNARIO 3 : HYBRIDE (Hybrid) ---
[Config Hybrid]
description = "50% mobile nodes, 50% stationary nodes"

*.host[0..4].mobilityType = "RandomWaypointMobility"
*.host[5..9].mobilityType = "StationaryMobility"

*.host[0..4].mobility.speed = uniform(2mps, 5mps)
*.host[0..4].mobility.waitTime = uniform(0s, 5s)
*.host[0..4].mobility.initialX = uniform(50m, 350m)
*.host[0..4].mobility.initialY = uniform(50m, 350m)

*.host[5..9].mobility.initialX = uniform(50m, 350m)
*.host[5..9].mobility.initialY = uniform(50m, 350m)

*.accessPoint.mobilityType = "StationaryMobility"
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

# --- VARIATIONS : NOMBRE DE STATIONS ---
[Config Static_5hosts]
extends = Static
*.numHosts = 5

[Config Static_10hosts]
extends = Static
*.numHosts = 10

[Config Static_20hosts]
extends = Static
*.numHosts = 20

[Config FullMobility_5hosts]
extends = FullMobility
*.numHosts = 5

[Config FullMobility_10hosts]
extends = FullMobility
*.numHosts = 10

[Config FullMobility_20hosts]
extends = FullMobility
*.numHosts = 20

[Config Hybrid_5hosts]
extends = Hybrid
*.numHosts = 5

[Config Hybrid_10hosts]
extends = Hybrid
*.numHosts = 10

[Config Hybrid_20hosts]
extends = Hybrid
*.numHosts = 20

# --- VARIATIONS : TAILLE DES PAQUETS (512 bytes) ---
[Config Static_512B]
extends = Static_10hosts
*.host[*].app[0].messageLength = 512B

[Config FullMobility_512B]
extends = FullMobility_10hosts
*.host[*].app[0].messageLength = 512B

[Config Hybrid_512B]
extends = Hybrid_10hosts
*.host[*].app[0].messageLength = 512B

# --- VARIATIONS : TAILLE DES PAQUETS (1024 bytes) ---
[Config Static_1024B]
extends = Static_10hosts
*.host[*].app[0].messageLength = 1024B

[Config FullMobility_1024B]
extends = FullMobility_10hosts
*.host[*].app[0].messageLength = 1024B

[Config Hybrid_1024B]
extends = Hybrid_10hosts
*.host[*].app[0].messageLength = 1024B

# --- VARIATIONS : TAILLE DES PAQUETS (2048 bytes) ---
[Config Static_2048B]
extends = Static_10hosts
*.host[*].app[0].messageLength = 2048B

[Config FullMobility_2048B]
extends = FullMobility_10hosts
*.host[*].app[0].messageLength = 2048B

[Config Hybrid_2048B]
extends = Hybrid_10hosts
*.host[*].app[0].messageLength = 2048B
