[General]
# Configuration générale de la simulation
network = WirelessNetwork
sim-time-limit = 600s
record-eventlog = false
repeat = 1

# Enregistrement des résultats
*.*.vector-recording = true
*.*.scalar-recording = true
**.app[*].*.vector-recording = true

# Gestion de la performance
# parallel-simulation = true

#================================================================================
# CONFIGURATION DU RÉSEAU SANS FIL
#================================================================================

# Paramètres de communication
*.numHosts = 10
*.playgroundSizeX = 400m
*.playgroundSizeY = 400m

# Couche physique - IEEE 802.11g (54 Mbps)
*.accessPoint.wlan[*].bitrate = 54Mbps
*.host[*].wlan[*].bitrate = 54Mbps

# Puissance de transmission (20 mW = 13 dBm)
*.accessPoint.wlan[*].radio.transmitter.power = 20mW
*.host[*].wlan[*].radio.transmitter.power = 20mW

# Fréquence
*.accessPoint.wlan[*].radio.centerFrequency = 2.4GHz
*.host[*].wlan[*].radio.centerFrequency = 2.4GHz

#================================================================================
# CONFIGURATION MAC (IEEE 802.11)
#================================================================================

# CSMA/CA parameters
*.*.wlan[*].mac.basicBitrate = 6Mbps
*.*.wlan[*].mac.controlBitrate = 6Mbps
*.*.wlan[*].mac.shortRetryLimit = 7
*.*.wlan[*].mac.longRetryLimit = 4

# RTS/CTS threshold
*.*.wlan[*].mac.rtsThreshold = 2346B

#================================================================================
# CONFIGURATION APPLICATION UDP
#================================================================================

# Point d'accès - Serveur UDP
*.accessPoint.numApps = 1
*.accessPoint.app[0].typename = "UdpSink"
*.accessPoint.app[0].localPort = 5000
*.accessPoint.app[0].outputFile = ""

# Stations - Clients UDP
*.host[*].numApps = 1
*.host[*].app[0].typename = "UdpBasicApp"
*.host[*].app[0].destAddresses = "accessPoint"
*.host[*].app[0].destPort = 5000
*.host[*].app[0].messageLength = 512B
*.host[*].app[0].sendInterval = 1s
*.host[*].app[0].timeToLive = 32

#================================================================================
# CONFIGURATION RÉSEAU IP
#================================================================================

*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.assignDisjunctSubnetAddresses = false

*.host[*].networkLayer.configurator.networkConfiguratorModule = ""
*.accessPoint.networkLayer.configurator.networkConfiguratorModule = ""

#================================================================================
# SCÉNARIO 1: STATIQUE (Tous les nœuds immobiles)
#================================================================================

[Config Static]
description = "Scenario statique - tous les noeuds immobiles"

# Mobilité
*.host[*].mobilityType = "StationaryMobility"
*.accessPoint.mobilityType = "StationaryMobility"

# Positions initiales (aléatoires dans la zone)
*.host[*].mobility.initialX = uniform(50m, 350m)
*.host[*].mobility.initialY = uniform(50m, 350m)

# Point d'accès au centre (haut de la zone)
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

#================================================================================
# SCÉNARIO 2: MOBILITÉ TOTALE (Tous les nœuds mobiles)
#================================================================================

[Config FullMobility]
description = "Scenario mobile - tous les noeuds se deplacent aleatoirement"

# Mobilité
*.host[*].mobilityType = "RandomWaypointMobility"
*.accessPoint.mobilityType = "StationaryMobility"

# Paramètres de mobilité Random Waypoint
*.host[*].mobility.speed = uniform(2mps, 5mps)      # 2-5 m/s (7.2-18 km/h)
*.host[*].mobility.waitTime = uniform(0s, 5s)       # Temps d'attente aléatoire
*.host[*].mobility.initialX = uniform(50m, 350m)
*.host[*].mobility.initialY = uniform(50m, 350m)

# Point d'accès stationnaire
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

#================================================================================
# SCÉNARIO 3: HYBRIDE (50% mobile, 50% stationnaire)
#================================================================================

[Config Hybrid]
description = "Scenario hybride - 50% mobile, 50% stationnaire"

# 50% des nœuds mobiles
*.host[0..4].mobilityType = "RandomWaypointMobility"
*.host[0..4].mobility.speed = uniform(2mps, 5mps)
*.host[0..4].mobility.waitTime = uniform(0s, 5s)
*.host[0..4].mobility.initialX = uniform(50m, 350m)
*.host[0..4].mobility.initialY = uniform(50m, 350m)

# 50% des nœuds stationnaires
*.host[5..9].mobilityType = "StationaryMobility"
*.host[5..9].mobility.initialX = uniform(50m, 350m)
*.host[5..9].mobility.initialY = uniform(50m, 350m)

# Point d'accès stationnaire
*.accessPoint.mobilityType = "StationaryMobility"
*.accessPoint.mobility.initialX = 200m
*.accessPoint.mobility.initialY = 50m

#================================================================================
# CONFIGURATIONS AVEC 5 STATIONS
#================================================================================

[Config Static_5hosts]
extends = Static
*.numHosts = 5
description = "Scenario statique avec 5 stations"

[Config FullMobility_5hosts]
extends = FullMobility
*.numHosts = 5
description = "Scenario mobile avec 5 stations"

[Config Hybrid_5hosts]
extends = Hybrid
*.numHosts = 5
description = "Scenario hybride avec 5 stations"

